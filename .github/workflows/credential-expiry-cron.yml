name: Credential Expiry Cron

on:
  schedule:
    - cron: "0 7 * * *" # 07:00 UTC daily
  workflow_dispatch: {}

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger credential expiry scan
        run: |
          if [ -z "${{ secrets.API_BASE_URL }}" ] || [ -z "${{ secrets.CRON_SECRET }}" ]; then
            echo "::error::API_BASE_URL and CRON_SECRET repo secrets must be configured for this workflow to run."
            exit 1
          fi
          http_code=$(curl -s -o /tmp/response.json -w "%{http_code}" -X POST \
            "${{ secrets.API_BASE_URL }}/api/cron/credential-expiry" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}")
          cat /tmp/response.json
          if [ "$http_code" -ge 300 ]; then
            echo "::error::Credential expiry scan failed with HTTP $http_code"
            exit 1
          fi
