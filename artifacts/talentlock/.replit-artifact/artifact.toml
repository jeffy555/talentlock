kind = "web"
previewPath = "/"
title = "TalentLock"
version = "1.0.0"
id = "artifacts/talentlock"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25807

[services.development]
run = "pnpm --filter @workspace/talentlock run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/talentlock", "run", "build" ]
publicDir = "artifacts/talentlock/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25807"
BASE_PATH = "/"
