            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /documents/confirm:
    post:
      operationId: postDocumentsConfirm
      tags: [documents]
      summary: Confirm document upload and queue AI review
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DocumentsConfirmBody"
      responses:
        "201":
          description: Upload confirmed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentsConfirmResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Freelancer profile required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /documents/me:
    get:
      operationId: getDocumentsMe
      tags: [documents]
      summary: Get my document verification status
      responses:
        "200":
          description: Verification status for the authenticated freelancer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentsMeResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Freelancer profile required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  # ── Team (Enterprise) ─────────────────────────────────────────────────────
  /team:
    get:
      operationId: getTeam
      tags: [team]
      summary: Get team details and member list
      responses:
        "200":
          description: Team details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamDetails"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "402":
          description: Enterprise plan required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlanLimitError"
        "403":
          description: Not a team member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    post:
      operationId: createTeam
      tags: [team]
      summary: Create a team (enterprise employer, once)
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTeamBody"
      responses:
        "201":
          description: Team created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamDetails"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "402":
          description: Enterprise plan required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlanLimitError"
        "409":
          description: Team already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    put:
      operationId: updateTeam
      tags: [team]
      summary: Update team name (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTeamBody"
      responses:
        "200":
          description: Updated team
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamDetails"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "402":
          description: Enterprise plan required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlanLimitError"
        "403":
          description: Admin only
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /team/invite:
    post:
      operationId: inviteTeamMember
      tags: [team]
      summary: Invite a team member (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InviteTeamMemberBody"
      responses:
        "201":
          description: Invitation sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamInviteResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "402":
          description: Enterprise plan required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlanLimitError"
        "403":
          description: Admin only
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "409":
          description: Duplicate invite
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /team/accept-invite:
    get:
      operationId: acceptTeamInvite
      tags: [team]
      summary: Accept a team invitation via token
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Invitation accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcceptTeamInviteResponse"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcceptTeamInviteAuthRequired"
        "403":
          description: Email mismatch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "409":
          description: Already accepted or already on a team
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InviteUsedError"
        "410":
          description: Invite expired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /team/shortlist:
    get:
      operationId: listTeamShortlist
      tags: [team]
      summary: List shared team shortlist (active team members)
      responses:
        "200":
          description: Team shortlist entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TeamShortlistItem"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "402":
          description: Enterprise plan required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlanLimitError"
        "403":
          description: Not a team member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    post:
      operationId: addTeamShortlist
      tags: [team]
      summary: Add a freelancer to the shared team shortlist
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddTeamShortlistBody"
      responses:
        "200":
          description: Already shortlisted (idempotent)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamShortlistItem"
        "201":
          description: Added to shortlist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamShortlistItem"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "402":
          description: Enterprise plan required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlanLimitError"
        "403":
          description: Not a team member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Freelancer not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /team/shortlist/{freelancerId}:
    delete:
      operationId: removeTeamShortlist
      tags: [team]
      summary: Remove a freelancer from the shared team shortlist
      parameters:
        - name: freelancerId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Removed from shortlist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RemoveTeamShortlistResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "402":
          description: Enterprise plan required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlanLimitError"
        "403":
          description: Not a team member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Shortlist entry not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /team/analytics:
    get:
      operationId: getTeamAnalytics
      tags: [team]
      summary: Team-wide hiring analytics (admin only)
      parameters:
        - name: window
          in: query
          schema:
            type: string
            enum: [30d, 90d, 12m]
            default: 90d
      responses:
        "200":
          description: Team analytics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamAnalytics"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "402":
          description: Enterprise plan required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlanLimitError"
        "403":
          description: Admin only
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /team/members/{memberId}:
    delete:
      operationId: removeTeamMember
      tags: [team]
      summary: Remove or deactivate a team member (admin only)
      parameters:
        - name: memberId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Member removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RemoveTeamMemberResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "402":
          description: Enterprise plan required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlanLimitError"
        "403":
          description: Admin only or cannot remove owner
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Member not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorEnvelope:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    # ── User ──────────────────────────────────────────────────────────────────
    User:
      type: object
      properties:
        id:
          type: integer
        clerkId:
          type: string
        role:
          type: string
          description: "freelancer or employer"
        email:
          type: string
        name:
          type: string
        avatarUrl:
          type: ["string", "null"]
        signatureImageUrl:
          type: ["string", "null"]
          description: "Stored signature image path (object storage)"
        emailNotificationsEnabled:
          type: boolean
          description: Whether the user receives email alerts for platform activity
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - clerkId
        - role
        - emailNotificationsEnabled
        - email
        - name
        - createdAt

    UpsertUserBody:
      type: object
      properties:
        role:
          type: string
          description: "freelancer or employer"
        email:
          type: string
        name:
          type: string
        avatarUrl:
          type: ["string", "null"]
        signatureImageUrl:
          type: ["string", "null"]
      required:
        - role
        - email
        - name

    # ── Freelancer Profile ─────────────────────────────────────────────────────
    FreelancerProfile:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        clerkId:
          type: string
        name:
          type: string
        tagline:
          type: string
        fieldOfWork:
          type: string
        skills:
          type: array
          items:
            type: string
        yearsExperience:
          type: integer
        bio:
          type: ["string", "null"]
        resumeUrl:
          type: ["string", "null"]
        portfolioUrl:
          type: ["string", "null"]
        paymentPreference:
          type: string
          description: "hourly or daily"
        hourlyRate:
          type: ["number", "null"]
        dailyRate:
          type: ["number", "null"]
        achievements:
          type: ["string", "null"]
        isVerified:
          type: boolean
        verificationStatus:
          type: string
          description: "unverified | pending | verified | rejected"
        verificationNote:
          type: ["string", "null"]
        verificationLevel:
          type: string
          description: "unverified | partially_verified | fully_verified"
        documentNames:
          type: array
          items:
            type: string
        isAvailable:
          type: boolean
        currentBookingId:
          type: ["integer", "null"]
        bookingEndDate:
          type: ["string", "null"]
          format: date-time
        subscriptionPlan:
          type: string
        availableFrom:
          type: ["string", "null"]
          format: date-time
        nextAvailableDate:
          type: ["string", "null"]
          format: date
          description: Cached next available date (null when not available)
        availabilityNote:
          type: ["string", "null"]
        averageRating:
          type: ["number", "null"]
        reviewCount:
          type: integer
        completenessScore:
          type: integer
          description: Profile completeness score 0–100 (Talent Vault requires ≥ 60)
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - userId
        - clerkId
        - name
        - tagline
        - fieldOfWork
        - skills
        - yearsExperience
        - paymentPreference
        - isVerified
        - isAvailable
        - subscriptionPlan
        - verificationLevel
        - reviewCount
        - completenessScore
        - createdAt

    PatchNotificationPreferencesBody:
      type: object
      properties:
        emailNotificationsEnabled:
          type: boolean
      required:
        - emailNotificationsEnabled

    NotificationPreferencesResult:
      type: object
      properties:
        success:
          type: boolean
        emailNotificationsEnabled:
          type: boolean
      required:
        - success
        - emailNotificationsEnabled

    FreelancerVerification:
      type: object
      properties:
        level:
          type: string
          description: "unverified | partially_verified | fully_verified"
        verifiedDocumentCount:
          type: integer
      required:
        - level
        - verifiedDocumentCount

    FreelancerProfileDetail:
      allOf:
        - $ref: "#/components/schemas/FreelancerProfile"
        - type: object
          properties:
            email:
              type: ["string", "null"]
            verification:
              $ref: "#/components/schemas/FreelancerVerification"
          required:
            - verification

    CreateFreelancerProfileBody:
      type: object
      properties:
        tagline:
          type: string
        fieldOfWork:
          type: string
        skills:
          type: array
          items:
            type: string
        yearsExperience:
          type: integer
        resumeUrl:
          type: ["string", "null"]
        paymentPreference:
          type: string
        hourlyRate:
          type: ["number", "null"]
        dailyRate:
          type: ["number", "null"]
        achievements:
          type: ["string", "null"]
        subscriptionPlan:
          type: string
        resumeAnalysis:
          $ref: "#/components/schemas/ResumeAnalysis"
          nullable: true
      required:
        - tagline
        - fieldOfWork
        - skills
        - yearsExperience
        - paymentPreference
        - subscriptionPlan

    AvailabilityBlockReason:
      type: string
      enum: [booked, holiday, unavailable]

    AvailabilityPublicBlock:
      type: object
      properties:
        id:
          type: integer
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        reason:
          $ref: "#/components/schemas/AvailabilityBlockReason"
      required:
        - id
        - startDate
        - endDate
        - reason

    AvailabilityMeBlock:
      type: object
      properties:
        id:
          type: integer
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        reason:
          $ref: "#/components/schemas/AvailabilityBlockReason"
        label:
          type: ["string", "null"]
        bookingId:
          type: ["string", "null"]
          description: Non-null when auto-created from a booking
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - startDate
        - endDate
        - reason
        - label
        - bookingId
        - createdAt

    AvailabilityPublicResponse:
      type: object
      properties:
        freelancerId:
          type: string
        nextAvailableDate:
          type: ["string", "null"]
          format: date
        blocks:
          type: array
          items:
            $ref: "#/components/schemas/AvailabilityPublicBlock"
      required:
        - freelancerId
        - nextAvailableDate
        - blocks

    AvailabilityMeResponse:
      type: object
      properties:
        nextAvailableDate:
          type: ["string", "null"]
          format: date
        blocks:
          type: array
          items:
            $ref: "#/components/schemas/AvailabilityMeBlock"
      required:
        - nextAvailableDate
        - blocks

    CreateAvailabilityBlockBody:
      type: object
      properties:
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        reason:
          type: string
          enum: [holiday, unavailable]
        label:
          type: string
          maxLength: 100
      required:
        - startDate
        - endDate
        - reason

    DeleteAvailabilityBlockResponse:
      type: object
      properties:
        success:
          type: boolean
      required:
        - success

    UpdateFreelancerProfileBody:
      type: object
      properties:
        tagline:
          type: string
        bio:
          type: ["string", "null"]
        fieldOfWork:
          type: string
        skills:
          type: array
          items:
            type: string
        yearsExperience:
          type: integer
        resumeUrl:
          type: ["string", "null"]
        portfolioUrl:
          type: ["string", "null"]
        paymentPreference:
          type: string
        hourlyRate:
          type: ["number", "null"]
        dailyRate:
          type: ["number", "null"]
        achievements:
          type: ["string", "null"]
        subscriptionPlan:
          type: string
        isAvailable:
          type: boolean
        availableFrom:
          type: ["string", "null"]
          format: date-time
        availabilityNote:
          type: ["string", "null"]

    # ── Employer Profile ───────────────────────────────────────────────────────
    EmployerProfile:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        clerkId:
          type: string
        companyName:
          type: string
        industry:
          type: string
        companySize:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        website:
          type: ["string", "null"]
        isVerified:
          type: boolean
        verificationStatus:
          type: string
          description: "unverified | pending | verified | rejected"
        verificationNote:
          type: ["string", "null"]
        documentNames:
          type: array
          items:
            type: string
        subscriptionPlan:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - userId
        - clerkId
        - companyName
        - industry
        - isVerified
        - subscriptionPlan
        - createdAt

    UpsertEmployerProfileBody:
      type: object
      properties:
        companyName:
          type: string
        industry:
          type: string
        companySize:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        website:
          type: ["string", "null"]
        subscriptionPlan:
          type: string
      required:
        - companyName
        - industry
        - subscriptionPlan

    # ── Job Requirement ────────────────────────────────────────────────────────
    JobRequirement:
      type: object
      properties:
        id:
          type: integer
        employerId:
          type: integer
        title:
          type: string
        fieldOfWork:
          type: string
        description:
          type: string
        requiredSkills:
          type: array
          items:
            type: string
        minExperience:
          type: integer
        paymentType:
          type: string
          description: "hourly or daily"
        budget:
          type: ["number", "null"]
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        status:
          type: string
          description: "open, filled, closed"
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - employerId
        - title
        - fieldOfWork
        - description
        - requiredSkills
        - minExperience
        - paymentType
        - startDate
        - endDate
        - status
        - createdAt

    CreateJobRequirementBody:
      type: object
      properties:
        title:
          type: string
        fieldOfWork:
          type: string
        description:
          type: string
        requiredSkills:
          type: array
          items:
            type: string
        minExperience:
          type: integer
        paymentType:
          type: string
        budget:
          type: ["number", "null"]
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
      required:
        - title
        - fieldOfWork
        - description
        - requiredSkills
        - minExperience
        - paymentType
        - startDate
        - endDate

    UpdateJobRequirementBody:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        requiredSkills:
          type: array
          items:
            type: string
        minExperience:
          type: integer
        budget:
          type: ["number", "null"]
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        status:
          type: string

    # ── Booking ────────────────────────────────────────────────────────────────
    Booking:
      type: object
      properties:
        id:
          type: integer
        freelancerId:
          type: integer
        employerId:
          type: integer
        jobRequirementId:
          type: ["integer", "null"]
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        status:
          type: string
          description: "pending, active, completed, cancelled"
        paymentType:
          type: string
        rate:
          type: ["number", "null"]
        notes:
          type: ["string", "null"]
        message:
          type: ["string", "null"]
          description: Optional message from employer when creating the booking
        proposedRate:
          type: ["number", "null"]
          description: Current outstanding rate proposal
        lastProposedBy:
          type: ["string", "null"]
          description: "'employer' or 'freelancer'"
        negotiationStatus:
          type: string
          description: "'negotiating' or 'agreed'"
        freelancerName:
          type: ["string", "null"]
        employerName:
          type: ["string", "null"]
        review:
          oneOf:
            - $ref: "#/components/schemas/PublicReview"
            - type: "null"
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - freelancerId
        - employerId
        - startDate
        - endDate
        - status
        - paymentType
        - negotiationStatus
        - createdAt
        - review

    CreateBookingBody:
      type: object
      properties:
        freelancerId:
          type: integer
        jobRequirementId:
          type: ["integer", "null"]
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        paymentType:
          type: string
        rate:
          type: ["number", "null"]
        message:
          type: ["string", "null"]
          maxLength: 500
          description: Optional message to the freelancer (max 500 chars)
      required:
        - freelancerId
        - startDate
        - endDate
        - paymentType

    UpdateBookingBody:
      type: object
      properties:
        status:
          type: string

    NegotiateBookingBody:
      type: object
      properties:
        action:
          type: string
          description: "'accept' to agree to the current proposed rate, 'counter' to propose a new rate"
