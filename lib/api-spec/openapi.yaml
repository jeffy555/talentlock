openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: TalentLock API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: users
    description: User profile management
  - name: freelancers
    description: Freelancer profile operations
  - name: employers
    description: Employer profile operations
  - name: job-requirements
    description: Employer job requirement postings
  - name: bookings
    description: Booking and exclusivity management
  - name: agreements
    description: Legal agreement generation and signing
  - name: meetings
    description: Pre-booking discovery meeting scheduling
  - name: openai
    description: AI-powered matching chat
  - name: messaging
    description: In-app direct messaging between employers and freelancers
  - name: dashboard
    description: Dashboard summary and stats
  - name: Storage
    description: Object storage upload and serving endpoints
  - name: reviews
    description: Post-booking reviews and ratings
  - name: portfolio
    description: Freelancer portfolio items
  - name: milestones
    description: Booking milestone tracking
  - name: analytics
    description: User-specific analytics and metrics
  - name: availability
    description: Freelancer availability calendar blocks
  - name: team
    description: Enterprise team accounts
  - name: cruise-mode
    description: Freelancer Cruise Mode automation and member management
  - name: talent-search
    description: Employer TalentSearch automation (employer-side Cruise Mode)
  - name: cron
    description: Machine-only scheduled job endpoints (shared-secret auth, not Clerk)

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Users ──────────────────────────────────────────────────────────────────
  /users/me:
    get:
      operationId: getMe
      tags: [users]
      summary: Get current user profile
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    put:
      operationId: upsertMe
      tags: [users]
      summary: Create or update current user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertUserBody"
      responses:
        "200":
          description: Upserted user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/me/onboarding-step:
    patch:
      operationId: patchOnboardingStep
      tags: [users]
      summary: Save in-progress onboarding role and step (upserts pending user)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchOnboardingStepBody"
      responses:
        "200":
          description: Updated user with onboarding progress
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: Invalid body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /users/me/location:
    patch:
      operationId: patchMyLocation
      tags: [users]
      summary: Update country, state, and derived currency after onboarding
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchLocationBody"
      responses:
        "200":
          description: Updated user with new location
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: Invalid location
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /countries:
    get:
      operationId: listCountries
      tags: [users]
      summary: List supported countries with states and currency metadata
      responses:
        "200":
          description: Supported countries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CountryList"

  /exchange-rates:
    get:
      operationId: getExchangeRates
      tags: [users]
      summary: Get cached USD-base exchange rates for display conversions
      responses:
        "200":
          description: Exchange rate snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExchangeRates"

  /users/me/notification-preferences:
    patch:
      operationId: patchNotificationPreferences
      tags: [users]
      summary: Update email notification preferences
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchNotificationPreferencesBody"
      responses:
        "200":
          description: Preferences updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationPreferencesResult"

  # ── Freelancers ─────────────────────────────────────────────────────────────
  /freelancers:
    get:
      operationId: listFreelancers
      tags: [freelancers]
      summary: List freelancer profiles
      parameters:
        - name: field
          in: query
          schema:
            type: string
          description: Filter by field of work
        - name: available
          in: query
          schema:
            type: boolean
          description: Filter by availability
        - name: verified
          in: query
          schema:
            type: boolean
          description: When true, only freelancers with at least one verified document
        - name: limit
          in: query
          schema:
            type: integer
          description: Number of results
        - name: offset
          in: query
          schema:
            type: integer
          description: Pagination offset
        - name: availableFrom
          in: query
          schema:
            type: string
            format: date
          description: Only return freelancers available on or before this date
        - name: q
          in: query
          schema:
            type: string
          description: Full-text keyword search across bio and skills
        - name: professionCategory
          in: query
          schema:
            type: string
            enum: [technology, education]
          description: Filter by profession category
        - name: teachingSubject
          in: query
          schema:
            type: string
          description: Case-insensitive substring match on teachingSubjects (education professionals)
        - name: countryCode
          in: query
          schema:
            type: string
            minLength: 2
            maxLength: 2
          description: Filter by freelancer country code (ISO 3166-1 alpha-2)
        - name: currencyCode
          in: query
          schema:
            type: string
            minLength: 3
            maxLength: 3
          description: Filter by freelancer currency code (ISO 4217)
      responses:
        "200":
          description: List of freelancers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FreelancerProfile"
    post:
      operationId: createFreelancerProfile
      tags: [freelancers]
      summary: Create freelancer profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFreelancerProfileBody"
      responses:
        "201":
          description: Created freelancer profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FreelancerProfile"

  /freelancers/me:
    get:
      operationId: getMyFreelancerProfile
      tags: [freelancers]
      summary: Get my freelancer profile
      responses:
        "200":
          description: My freelancer profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FreelancerProfile"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    patch:
      operationId: updateMyFreelancerProfile
      tags: [freelancers]
      summary: Update my freelancer profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateFreelancerProfileBody"
      responses:
        "200":
          description: Updated freelancer profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FreelancerProfile"

  /freelancers/{id}:
    get:
      operationId: getFreelancerProfile
      tags: [freelancers]
      summary: Get a freelancer profile by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Freelancer profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FreelancerProfileDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /availability/me:
    get:
      operationId: getMyAvailability
      tags: [availability]
      summary: Get my availability blocks (freelancer only)
      responses:
        "200":
          description: Freelancer availability with full block detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AvailabilityMeResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Forbidden — employers cannot access
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Freelancer profile not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    post:
      operationId: createAvailabilityBlock
      tags: [availability]
      summary: Create a manual availability block (freelancer only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAvailabilityBlockBody"
      responses:
        "201":
          description: Created availability block
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AvailabilityMeBlock"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Forbidden — employers cannot access
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /availability/me/{id}:
    delete:
      operationId: deleteAvailabilityBlock
      tags: [availability]
      summary: Delete a manual availability block (freelancer only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Block deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteAvailabilityBlockResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Block not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "409":
          description: Cannot delete auto-created booking block
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /availability/{freelancerId}:
    get:
      operationId: getFreelancerAvailability
      tags: [availability]
      summary: Get public availability blocks for a freelancer
      parameters:
        - name: freelancerId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Public availability (no label or bookingId)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AvailabilityPublicResponse"
        "400":
          description: Invalid ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Freelancer not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  # ── Employers ───────────────────────────────────────────────────────────────
  /employers/me:
    get:
      operationId: getMyEmployerProfile
      tags: [employers]
      summary: Get my employer profile
      responses:
        "200":
          description: My employer profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployerProfile"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    put:
      operationId: upsertMyEmployerProfile
      tags: [employers]
      summary: Create or update my employer profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertEmployerProfileBody"
      responses:
        "200":
          description: Upserted employer profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployerProfile"

  # ── Job Requirements ─────────────────────────────────────────────────────────
  /job-requirements:
    get:
      operationId: listJobRequirements
      tags: [job-requirements]
      summary: List job requirements
      parameters:
        - name: employerId
          in: query
          schema:
            type: integer
          description: Filter by employer
        - name: status
          in: query
          schema:
            type: string
          description: Filter by status (open, filled, closed)
      responses:
        "200":
          description: List of job requirements
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/JobRequirement"
    post:
      operationId: createJobRequirement
      tags: [job-requirements]
      summary: Create a job requirement
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateJobRequirementBody"
      responses:
        "201":
          description: Created job requirement
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobRequirement"

  /job-requirements/{id}:
    get:
      operationId: getJobRequirement
      tags: [job-requirements]
      summary: Get a job requirement
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Job requirement
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobRequirement"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    patch:
      operationId: updateJobRequirement
      tags: [job-requirements]
      summary: Update a job requirement
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateJobRequirementBody"
      responses:
        "200":
          description: Updated job requirement
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobRequirement"
    delete:
      operationId: deleteJobRequirement
      tags: [job-requirements]
      summary: Delete a job requirement
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /job-requirements/{id}/interest:
    post:
      operationId: expressJobInterest
      tags: [job-requirements]
      summary: Freelancer expresses interest in a job
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExpressInterestBody"
      responses:
        "201":
          description: Interest recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobInterest"
        "402":
          description: Plan limit reached
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlanLimitError"
        "409":
          description: Already expressed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /job-requirements/{id}/my-interest:
    get:
      operationId: getMyJobInterest
      tags: [job-requirements]
      summary: Check if the current freelancer expressed interest
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Interest status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MyJobInterest"

  /job-requirements/{id}/interests:
    get:
      operationId: listJobInterests
      tags: [job-requirements]
      summary: List freelancers who expressed interest (owner employer only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Interest list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/JobInterestWithFreelancer"

  # ── Notifications ────────────────────────────────────────────────────────────
  /notifications/unread-count:
    get:
      operationId: getNotificationsUnreadCount
      tags: [users]
      summary: Unread notification count for the current user
      responses:
        "200":
          description: Unread count
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationsUnreadCount"

  /notifications:
    get:
      operationId: listNotifications
      tags: [users]
      summary: Paginated notifications for the current user
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 20
      responses:
        "200":
          description: Paginated notifications
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationsListResult"

  /notifications/read-all:
    patch:
      operationId: markAllNotificationsRead
      tags: [users]
      summary: Mark all notifications as read for the current user
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationMarkSuccess"

  /notifications/{id}/read:
    patch:
      operationId: markNotificationRead
      tags: [users]
      summary: Mark a notification as read
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationMarkSuccess"

  # ── Subscriptions ────────────────────────────────────────────────────────────
  /subscriptions/plans:
    get:
      operationId: listPlans
      tags: [users]
      summary: List available subscription plans
      parameters:
        - name: audience
          in: query
          schema:
            type: string
            enum: [freelancer, employer, any]
      responses:
        "200":
          description: Plans
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PlanDef"

  /subscriptions/me:
    get:
      operationId: getMySubscription
      tags: [users]
      summary: Get the current user's subscription, plan, and usage
      responses:
        "200":
          description: Subscription summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionSummary"

  /subscriptions/upgrade:
    post:
      operationId: upgradeSubscription
      tags: [users]
      summary: Upgrade or change the current user's plan (simulated checkout)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpgradeSubscriptionBody"
      responses:
        "200":
          description: Updated subscription
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionSummary"

  /token-usage/me:
    get:
      operationId: getTokenUsageMe
      tags: [users]
      summary: Get the current employer's AI token usage for the UTC calendar month
      responses:
        "200":
          description: Token usage summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenUsageSummary"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Not an employer account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /token-usage/conversation/{conversationId}:
    get:
      operationId: getTokenUsageConversationId
      tags: [users]
      summary: Get per-conversation AI token breakdown (Growth/Enterprise employers)
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation token breakdown
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversationTokenBreakdown"
        "400":
          description: Invalid conversation ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "402":
          description: Starter plan — feature requires Growth
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlanLimitError"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Conversation not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  # ── Bookings ─────────────────────────────────────────────────────────────────
  /bookings:
    get:
      operationId: listBookings
      tags: [bookings]
      summary: List bookings
      parameters:
        - name: status
          in: query
          schema:
            type: string
          description: Filter by status (active, completed, cancelled)
        - name: role
          in: query
          schema:
            type: string
          description: Filter by role (freelancer, employer)
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Paginated list of bookings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedBookingsResult"
    post:
      operationId: createBooking
      tags: [bookings]
      summary: Create a booking
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBookingBody"
      responses:
        "201":
          description: Created booking
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"

  /bookings/{id}:
    get:
      operationId: getBooking
      tags: [bookings]
      summary: Get a booking
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Booking
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    patch:
      operationId: updateBooking
      tags: [bookings]
      summary: Update booking status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBookingBody"
      responses:
        "200":
          description: Updated booking
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"

  /bookings/{id}/debrief:
    get:
      operationId: getBookingDebrief
      tags: [bookings]
      summary: Get role-filtered post-engagement debrief for a completed booking
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Debrief slice for the authenticated participant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookingDebriefResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Booking not found or debrief not ready
          content:
            application/json:
              schema:
