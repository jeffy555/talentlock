        - employerFollowUpSent
        - createdAt

    TalentSearchActivityItem:
      allOf:
        - $ref: "#/components/schemas/TalentSearchActivity"
        - type: object
          properties:
            freelancerName:
              type: string
          required: [freelancerName]

    PaginatedTalentSearchActivityResult:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/TalentSearchActivityItem"
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer
        totalPages:
          type: integer
      required: [data, total, page, pageSize, totalPages]

    TalentSearchStats:
      type: object
      properties:
        evaluatedToday:
          type: integer
        sentToday:
          type: integer
        skippedToday:
          type: integer
        dryRunToday:
          type: integer
        hoursUsedToday:
          type: number
          format: double
        dailyLimitHours:
          type: number
          format: double
        hoursRemainingToday:
          type: number
          format: double
        hoursResetAt:
          type: string
          format: date-time
      required:
        - evaluatedToday
        - sentToday
        - skippedToday
        - dryRunToday
        - hoursUsedToday
        - dailyLimitHours
        - hoursRemainingToday
        - hoursResetAt

    UpsertTalentSearchBody:
      type: object
      properties:
        rules:
          $ref: "#/components/schemas/TalentSearchRules"
        rawRulesText:
          type: ["string", "null"]
      required: [rules]

    ParseTalentSearchRulesBody:
      type: object
      properties:
        rawText:
          type: string
          minLength: 1
          maxLength: 10000
      required: [rawText]

    ParseTalentSearchRulesResult:
      type: object
      properties:
        rules:
          $ref: "#/components/schemas/TalentSearchRules"
        warnings:
          type: array
          items: { type: string }
      required: [rules, warnings]
