  /talent-search/stats:
    get:
      operationId: getTalentSearchStats
      tags: [talent-search]
      summary: TalentSearch stats for today
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TalentSearchStats"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Employer profile required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  # ── Cron (machine-only) ──────────────────────────────────────────────────────
  /cron/credential-expiry:
    post:
      operationId: postCronCredentialExpiry
      tags: [cron]
      summary: Daily credential expiry scan (machine-only, shared-secret auth via x-cron-secret header)
      description: >
        Not part of the browser-facing API contract — documented for completeness only.
        Requires an x-cron-secret header matching the CRON_SECRET environment variable.
        Deliberately mounted outside /api/admin so the CSRF double-submit middleware never applies.
      responses:
        "200":
          description: Scan complete
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CredentialExpiryScanResult"
        "401":
          description: Missing or incorrect x-cron-secret header
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: CRON_SECRET not configured, or scan failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

