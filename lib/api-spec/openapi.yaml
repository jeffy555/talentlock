        - bookingId
        - freelancerId
        - employerId
        - content
        - status
        - createdAt

    CreateAgreementBody:
      type: object
      properties:
        bookingId:
          type: integer
      required:
        - bookingId

    SignAgreementBody:
      type: object
      properties:
        role:
          type: string
          description: "freelancer or employer"
        signatureName:
          type: string
          description: "Full name typed as signature"
      required:
        - role
        - signatureName

