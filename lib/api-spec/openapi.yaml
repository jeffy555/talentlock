openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: TalentLock API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: users
    description: User profile management
  - name: freelancers
    description: Freelancer profile operations
  - name: employers
    description: Employer profile operations
  - name: job-requirements
    description: Employer job requirement postings
  - name: bookings
    description: Booking and exclusivity management
  - name: agreements
    description: Legal agreement generation and signing
  - name: meetings
    description: Pre-booking discovery meeting scheduling
  - name: openai
    description: AI-powered matching chat
  - name: dashboard
    description: Dashboard summary and stats
  - name: Storage
    description: Object storage upload and serving endpoints
  - name: reviews
    description: Post-booking reviews and ratings
  - name: portfolio
    description: Freelancer portfolio items
  - name: milestones
    description: Booking milestone tracking
  - name: analytics
    description: User-specific analytics and metrics

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Users ──────────────────────────────────────────────────────────────────
  /users/me:
    get:
      operationId: getMe
      tags: [users]
      summary: Get current user profile
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    put:
      operationId: upsertMe
      tags: [users]
      summary: Create or update current user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertUserBody"
      responses:
        "200":
          description: Upserted user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  # ── Freelancers ─────────────────────────────────────────────────────────────
  /freelancers:
    get:
      operationId: listFreelancers
      tags: [freelancers]
      summary: List freelancer profiles
      parameters:
        - name: field
          in: query
          schema:
            type: string
          description: Filter by field of work
        - name: available
          in: query
          schema:
            type: boolean
          description: Filter by availability
        - name: limit
          in: query
          schema:
            type: integer
          description: Number of results
        - name: offset
          in: query
          schema:
            type: integer
          description: Pagination offset
      responses:
        "200":
          description: List of freelancers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FreelancerProfile"
    post:
      operationId: createFreelancerProfile
      tags: [freelancers]
      summary: Create freelancer profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFreelancerProfileBody"
      responses:
        "201":
          description: Created freelancer profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FreelancerProfile"

  /freelancers/me:
    get:
      operationId: getMyFreelancerProfile
      tags: [freelancers]
      summary: Get my freelancer profile
      responses:
        "200":
          description: My freelancer profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FreelancerProfile"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    patch:
      operationId: updateMyFreelancerProfile
      tags: [freelancers]
      summary: Update my freelancer profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateFreelancerProfileBody"
      responses:
        "200":
          description: Updated freelancer profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FreelancerProfile"

  /freelancers/{id}:
    get:
      operationId: getFreelancerProfile
      tags: [freelancers]
      summary: Get a freelancer profile by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Freelancer profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FreelancerProfile"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  # ── Employers ───────────────────────────────────────────────────────────────
  /employers/me:
    get:
      operationId: getMyEmployerProfile
      tags: [employers]
      summary: Get my employer profile
      responses:
        "200":
          description: My employer profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployerProfile"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    put:
      operationId: upsertMyEmployerProfile
      tags: [employers]
      summary: Create or update my employer profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertEmployerProfileBody"
      responses:
        "200":
          description: Upserted employer profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployerProfile"

  # ── Job Requirements ─────────────────────────────────────────────────────────
  /job-requirements:
    get:
      operationId: listJobRequirements
      tags: [job-requirements]
      summary: List job requirements
      parameters:
        - name: employerId
          in: query
          schema:
            type: integer
          description: Filter by employer
        - name: status
          in: query
          schema:
            type: string
          description: Filter by status (open, filled, closed)
      responses:
        "200":
          description: List of job requirements
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/JobRequirement"
    post:
      operationId: createJobRequirement
      tags: [job-requirements]
      summary: Create a job requirement
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateJobRequirementBody"
      responses:
        "201":
          description: Created job requirement
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobRequirement"

  /job-requirements/{id}:
    get:
      operationId: getJobRequirement
      tags: [job-requirements]
      summary: Get a job requirement
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Job requirement
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobRequirement"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    patch:
      operationId: updateJobRequirement
      tags: [job-requirements]
      summary: Update a job requirement
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateJobRequirementBody"
      responses:
        "200":
          description: Updated job requirement
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobRequirement"
    delete:
      operationId: deleteJobRequirement
      tags: [job-requirements]
      summary: Delete a job requirement
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /job-requirements/{id}/interest:
    post:
      operationId: expressJobInterest
      tags: [job-requirements]
      summary: Freelancer expresses interest in a job
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExpressInterestBody"
      responses:
        "201":
          description: Interest recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobInterest"
        "402":
          description: Plan limit reached
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlanLimitError"
        "409":
          description: Already expressed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /job-requirements/{id}/my-interest:
    get:
      operationId: getMyJobInterest
      tags: [job-requirements]
      summary: Check if the current freelancer expressed interest
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Interest status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MyJobInterest"

  /job-requirements/{id}/interests:
    get:
      operationId: listJobInterests
      tags: [job-requirements]
      summary: List freelancers who expressed interest (owner employer only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Interest list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/JobInterestWithFreelancer"

  # ── Notifications ────────────────────────────────────────────────────────────
  /notifications:
    get:
      operationId: listNotifications
      tags: [users]
      summary: List the current user's notifications
      responses:
        "200":
          description: Notifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notification"

  /notifications/{id}/read:
    patch:
      operationId: markNotificationRead
      tags: [users]
      summary: Mark a notification as read
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated notification
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Notification"

  /notifications/read-all:
    post:
      operationId: markAllNotificationsRead
      tags: [users]
      summary: Mark all notifications as read for the current user
      responses:
        "200":
          description: Count of notifications updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  updated:
                    type: integer
                required: [updated]

  # ── Subscriptions ────────────────────────────────────────────────────────────
  /subscriptions/plans:
    get:
      operationId: listPlans
      tags: [users]
      summary: List available subscription plans
      parameters:
        - name: audience
          in: query
          schema:
            type: string
            enum: [freelancer, employer, any]
      responses:
        "200":
          description: Plans
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PlanDef"

  /subscriptions/me:
    get:
      operationId: getMySubscription
      tags: [users]
      summary: Get the current user's subscription, plan, and usage
      responses:
        "200":
          description: Subscription summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionSummary"

  /subscriptions/upgrade:
    post:
      operationId: upgradeSubscription
      tags: [users]
      summary: Upgrade or change the current user's plan (simulated checkout)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpgradeSubscriptionBody"
      responses:
        "200":
          description: Updated subscription
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionSummary"

  # ── Bookings ─────────────────────────────────────────────────────────────────
  /bookings:
    get:
      operationId: listBookings
      tags: [bookings]
      summary: List bookings
      parameters:
        - name: status
          in: query
          schema:
            type: string
          description: Filter by status (active, completed, cancelled)
        - name: role
          in: query
          schema:
            type: string
          description: Filter by role (freelancer, employer)
      responses:
        "200":
          description: List of bookings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Booking"
    post:
      operationId: createBooking
      tags: [bookings]
      summary: Create a booking
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBookingBody"
      responses:
        "201":
          description: Created booking
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"

  /bookings/{id}:
    get:
      operationId: getBooking
      tags: [bookings]
      summary: Get a booking
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Booking
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    patch:
      operationId: updateBooking
      tags: [bookings]
      summary: Update booking status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBookingBody"
      responses:
        "200":
          description: Updated booking
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"

  # ── Agreements ───────────────────────────────────────────────────────────────
  /agreements:
    get:
      operationId: listAgreements
      tags: [agreements]
      summary: List agreements
      parameters:
        - name: status
          in: query
          schema:
            type: string
          description: Filter by status (draft, pending_signatures, signed, active, completed)
      responses:
        "200":
          description: List of agreements
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Agreement"
    post:
      operationId: createAgreement
      tags: [agreements]
      summary: Generate an AI legal agreement for a booking
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAgreementBody"
      responses:
        "201":
          description: Created agreement with AI-generated content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agreement"

  /agreements/{id}:
    get:
      operationId: getAgreement
      tags: [agreements]
      summary: Get an agreement
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Agreement
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agreement"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /agreements/{id}/sign:
    post:
      operationId: signAgreement
      tags: [agreements]
      summary: Sign an agreement (employer or freelancer)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignAgreementBody"
      responses:
        "200":
          description: Updated agreement after signing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agreement"
        "400":
          description: Already signed or invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  # ── Meetings ─────────────────────────────────────────────────────────────────
  /meetings:
    get:
      operationId: listMeetings
      tags: [meetings]
      summary: List meetings for the current user
      responses:
        "200":
          description: List of meetings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Meeting"
    post:
      operationId: createMeeting
      tags: [meetings]
      summary: Schedule a discovery meeting with a freelancer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMeetingBody"
      responses:
        "201":
          description: Created meeting
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Meeting"

  /meetings/{id}:
    get:
      operationId: getMeeting
      tags: [meetings]
      summary: Get a meeting by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Meeting
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Meeting"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    patch:
      operationId: updateMeeting
      tags: [meetings]
      summary: Update meeting status or details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMeetingBody"
      responses:
        "200":
          description: Updated meeting
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Meeting"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  # ── AI Matching (OpenAI) ─────────────────────────────────────────────────────
  /openai/conversations:
    get:
      operationId: listOpenaiConversations
      tags: [openai]
      summary: List AI matching conversations
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OpenaiConversation"
    post:
      operationId: createOpenaiConversation
      tags: [openai]
      summary: Start a new AI matching conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOpenaiConversationBody"
      responses:
        "201":
          description: Created conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiConversation"

  /openai/conversations/{id}:
    get:
      operationId: getOpenaiConversation
      tags: [openai]
      summary: Get conversation with messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiConversationWithMessages"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    delete:
      operationId: deleteOpenaiConversation
      tags: [openai]
      summary: Delete a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /openai/conversations/{id}/messages:
    post:
      operationId: sendOpenaiMessage
      tags: [openai]
      summary: Send a message in a conversation and get AI response
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendOpenaiMessageBody"
      responses:
        "200":
          description: AI response message
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiMessage"

  # ── Dashboard ────────────────────────────────────────────────────────────────
  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Get dashboard statistics for the current user
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /dashboard/activity:
    get:
      operationId: getDashboardActivity
      tags: [dashboard]
      summary: Recent activity feed for the current user
      responses:
        "200":
          description: Activity items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  # ── Storage ───────────────────────────────────────────────────────────────────
  /storage/uploads/request-url:
    post:
      tags: [Storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadUrlRequest'
      responses:
        '200':
          description: Presigned upload URL generated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadUrlResponse'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Failed to generate upload URL.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /storage/public-objects/{filePath}:
    get:
      tags: [Storage]
      operationId: getPublicObject
      summary: Serve a public asset
      parameters:
        - name: filePath
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Object content streamed.
          content:
            '*/*':
              schema:
                type: string
                format: binary
        '404':
          description: Not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /storage/objects/{filePath}:
    get:
      tags: [Storage]
      operationId: getObject
      summary: Serve a private object entity
      parameters:
        - name: filePath
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Object content streamed.
          content:
            '*/*':
              schema:
                type: string
                format: binary
        '404':
          description: Not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  # ── Reviews ──────────────────────────────────────────────────────────────
  /reviews/freelancer/{freelancerId}:
    get:
      operationId: listFreelancerReviews
      tags: [reviews]
      summary: List reviews for a freelancer (public)
      parameters:
        - name: freelancerId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Reviews with aggregate rating
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FreelancerReviewsResult"

  /reviews/my-review/{bookingId}:
    get:
      operationId: getMyBookingReview
      tags: [reviews]
      summary: Check whether current user has reviewed a booking
      parameters:
        - name: bookingId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Review check result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MyReviewResult"

  /reviews:
    post:
      operationId: createReview
      tags: [reviews]
      summary: Submit a review for a completed booking
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReviewBody"
      responses:
        "201":
          description: Created review
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"
        "409":
          description: Already reviewed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  # ── Saved Freelancers ────────────────────────────────────────────────────
  /freelancers/saved:
    get:
      operationId: listSavedFreelancers
      tags: [freelancers]
      summary: List saved/shortlisted freelancers (employer only)
      responses:
        "200":
          description: List of saved freelancer profiles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FreelancerProfile"

  /freelancers/{id}/saved:
    get:
      operationId: checkFreelancerSaved
      tags: [freelancers]
      summary: Check if the current employer has saved this freelancer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Saved status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SaveToggleResult"

  /freelancers/{id}/save:
    post:
      operationId: toggleSaveFreelancer
      tags: [freelancers]
      summary: Toggle save/unsave a freelancer (employer only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated saved status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SaveToggleResult"

  # ── Portfolio ─────────────────────────────────────────────────────────────
  /freelancers/{id}/portfolio:
    get:
      operationId: listFreelancerPortfolio
      tags: [portfolio]
      summary: List portfolio items for a freelancer (public)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Portfolio items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PortfolioItem"

  /portfolio/me:
    get:
      operationId: listMyPortfolio
      tags: [portfolio]
      summary: List my portfolio items
      responses:
        "200":
          description: My portfolio items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PortfolioItem"

  /portfolio:
    post:
      operationId: createPortfolioItem
      tags: [portfolio]
      summary: Create a portfolio item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePortfolioItemBody"
      responses:
        "201":
          description: Created portfolio item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortfolioItem"

  /portfolio/{id}:
    patch:
      operationId: updatePortfolioItem
      tags: [portfolio]
      summary: Update a portfolio item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePortfolioItemBody"
      responses:
        "200":
          description: Updated portfolio item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortfolioItem"
    delete:
      operationId: deletePortfolioItem
      tags: [portfolio]
      summary: Delete a portfolio item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted: { type: boolean }
                required: [deleted]

  # ── Milestones ────────────────────────────────────────────────────────────
  /bookings/{id}/milestones:
    get:
      operationId: listMilestones
      tags: [milestones]
      summary: List milestones for a booking
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of milestones
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Milestone"
    post:
      operationId: createMilestone
      tags: [milestones]
      summary: Add a milestone to a booking
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMilestoneBody"
      responses:
        "201":
          description: Created milestone
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Milestone"

  /milestones/{id}:
    patch:
      operationId: updateMilestone
      tags: [milestones]
      summary: Update milestone status or details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMilestoneBody"
      responses:
        "200":
          description: Updated milestone
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Milestone"

  # ── Analytics ─────────────────────────────────────────────────────────────
  /analytics/me:
    get:
      operationId: getMyAnalytics
      tags: [analytics]
      summary: Get analytics for the current user (monthly metrics + totals)
      responses:
        "200":
          description: Analytics data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsData"

  # ── Public Profile ────────────────────────────────────────────────────────
  /public/freelancers/{id}:
    get:
      operationId: getPublicFreelancerProfile
      tags: [freelancers]
      summary: Get a public freelancer profile (no auth required)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Public freelancer profile with portfolio and reviews
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicFreelancerProfile"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  # ── Verify Documents ──────────────────────────────────────────────────────
  /verify/documents:
    post:
      operationId: verifyDocuments
      tags: [users]
      summary: Submit documents for AI verification and send confirmation email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyDocumentsBody"
      responses:
        "200":
          description: Verification result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerifyDocumentsResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorEnvelope:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    # ── User ──────────────────────────────────────────────────────────────────
    User:
      type: object
      properties:
        id:
          type: integer
        clerkId:
          type: string
        role:
          type: string
          description: "freelancer or employer"
        email:
          type: string
        name:
          type: string
        avatarUrl:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - clerkId
        - role
        - email
        - name
        - createdAt

    UpsertUserBody:
      type: object
      properties:
        role:
          type: string
          description: "freelancer or employer"
        email:
          type: string
        name:
          type: string
        avatarUrl:
          type: ["string", "null"]
      required:
        - role
        - email
        - name

    # ── Freelancer Profile ─────────────────────────────────────────────────────
    FreelancerProfile:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        clerkId:
          type: string
        name:
          type: string
        tagline:
          type: string
        fieldOfWork:
          type: string
        skills:
          type: array
          items:
            type: string
        yearsExperience:
          type: integer
        bio:
          type: ["string", "null"]
        resumeUrl:
          type: ["string", "null"]
        portfolioUrl:
          type: ["string", "null"]
        paymentPreference:
          type: string
          description: "hourly or daily"
        hourlyRate:
          type: ["number", "null"]
        dailyRate:
          type: ["number", "null"]
        achievements:
          type: ["string", "null"]
        isVerified:
          type: boolean
        verificationStatus:
          type: string
          description: "unverified | pending | verified | rejected"
        verificationNote:
          type: ["string", "null"]
        documentNames:
          type: array
          items:
            type: string
        isAvailable:
          type: boolean
        currentBookingId:
          type: ["integer", "null"]
        bookingEndDate:
          type: ["string", "null"]
          format: date-time
        subscriptionPlan:
          type: string
        availableFrom:
          type: ["string", "null"]
          format: date-time
        availabilityNote:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - userId
        - clerkId
        - name
        - tagline
        - fieldOfWork
        - skills
        - yearsExperience
        - paymentPreference
        - isVerified
        - isAvailable
        - subscriptionPlan
        - createdAt

    CreateFreelancerProfileBody:
      type: object
      properties:
        tagline:
          type: string
        fieldOfWork:
          type: string
        skills:
          type: array
          items:
            type: string
        yearsExperience:
          type: integer
        resumeUrl:
          type: ["string", "null"]
        paymentPreference:
          type: string
        hourlyRate:
          type: ["number", "null"]
        dailyRate:
          type: ["number", "null"]
        achievements:
          type: ["string", "null"]
        subscriptionPlan:
          type: string
        resumeAnalysis:
          $ref: "#/components/schemas/ResumeAnalysis"
          nullable: true
      required:
        - tagline
        - fieldOfWork
        - skills
        - yearsExperience
        - paymentPreference
        - subscriptionPlan

    UpdateFreelancerProfileBody:
      type: object
      properties:
        tagline:
          type: string
        bio:
          type: ["string", "null"]
        fieldOfWork:
          type: string
        skills:
          type: array
          items:
            type: string
        yearsExperience:
          type: integer
        resumeUrl:
          type: ["string", "null"]
        portfolioUrl:
          type: ["string", "null"]
        paymentPreference:
          type: string
        hourlyRate:
          type: ["number", "null"]
        dailyRate:
          type: ["number", "null"]
        achievements:
          type: ["string", "null"]
        subscriptionPlan:
          type: string
        isAvailable:
          type: boolean
        availableFrom:
          type: ["string", "null"]
          format: date-time
        availabilityNote:
          type: ["string", "null"]

    # ── Employer Profile ───────────────────────────────────────────────────────
    EmployerProfile:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        clerkId:
          type: string
        companyName:
          type: string
        industry:
          type: string
        companySize:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        website:
          type: ["string", "null"]
        isVerified:
          type: boolean
        verificationStatus:
          type: string
          description: "unverified | pending | verified | rejected"
        verificationNote:
          type: ["string", "null"]
        documentNames:
          type: array
          items:
            type: string
        subscriptionPlan:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - userId
        - clerkId
        - companyName
        - industry
        - isVerified
        - subscriptionPlan
        - createdAt

    UpsertEmployerProfileBody:
      type: object
      properties:
        companyName:
          type: string
        industry:
          type: string
        companySize:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        website:
          type: ["string", "null"]
        subscriptionPlan:
          type: string
      required:
        - companyName
        - industry
        - subscriptionPlan

    # ── Job Requirement ────────────────────────────────────────────────────────
    JobRequirement:
      type: object
      properties:
        id:
          type: integer
        employerId:
          type: integer
        title:
          type: string
        fieldOfWork:
          type: string
        description:
          type: string
        requiredSkills:
          type: array
          items:
            type: string
        minExperience:
          type: integer
        paymentType:
          type: string
          description: "hourly or daily"
        budget:
          type: ["number", "null"]
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        status:
          type: string
          description: "open, filled, closed"
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - employerId
        - title
        - fieldOfWork
        - description
        - requiredSkills
        - minExperience
        - paymentType
        - startDate
        - endDate
        - status
        - createdAt

    CreateJobRequirementBody:
      type: object
      properties:
        title:
          type: string
        fieldOfWork:
          type: string
        description:
          type: string
        requiredSkills:
          type: array
          items:
            type: string
        minExperience:
          type: integer
        paymentType:
          type: string
        budget:
          type: ["number", "null"]
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
      required:
        - title
        - fieldOfWork
        - description
        - requiredSkills
        - minExperience
        - paymentType
        - startDate
        - endDate

    UpdateJobRequirementBody:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        requiredSkills:
          type: array
          items:
            type: string
        minExperience:
          type: integer
        budget:
          type: ["number", "null"]
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        status:
          type: string

    # ── Booking ────────────────────────────────────────────────────────────────
    Booking:
      type: object
      properties:
        id:
          type: integer
        freelancerId:
          type: integer
        employerId:
          type: integer
        jobRequirementId:
          type: ["integer", "null"]
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        status:
          type: string
          description: "pending, active, completed, cancelled"
        paymentType:
          type: string
        rate:
          type: ["number", "null"]
        notes:
          type: ["string", "null"]
        freelancerName:
          type: ["string", "null"]
        employerName:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - freelancerId
        - employerId
        - startDate
        - endDate
        - status
        - paymentType
        - createdAt

    CreateBookingBody:
      type: object
      properties:
        freelancerId:
          type: integer
        jobRequirementId:
          type: ["integer", "null"]
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        paymentType:
          type: string
        rate:
          type: ["number", "null"]
      required:
        - freelancerId
        - startDate
        - endDate
        - paymentType

    UpdateBookingBody:
      type: object
      properties:
        status:
          type: string

    # ── Agreement ──────────────────────────────────────────────────────────────
    Agreement:
      type: object
      properties:
        id:
          type: integer
        bookingId:
          type: integer
        freelancerId:
          type: integer
        employerId:
          type: integer
        content:
          type: string
          description: AI-generated legal agreement text
        status:
          type: string
          description: "draft, pending_signatures, signed, active, completed"
        freelancerSignedAt:
          type: ["string", "null"]
          format: date-time
        employerSignedAt:
          type: ["string", "null"]
          format: date-time
        freelancerSignatureName:
          type: ["string", "null"]
        employerSignatureName:
          type: ["string", "null"]
        documentUrl:
          type: ["string", "null"]
        freelancerName:
          type: ["string", "null"]
        employerName:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - bookingId
        - freelancerId
        - employerId
        - content
        - status
        - createdAt

    CreateAgreementBody:
      type: object
      properties:
        bookingId:
          type: integer
      required:
        - bookingId

    SignAgreementBody:
      type: object
      properties:
        role:
          type: string
          description: "freelancer or employer"
        signatureName:
          type: string
          description: "Full name typed as signature"
      required:
        - role
        - signatureName

    # ── Meetings ───────────────────────────────────────────────────────────────
    Meeting:
      type: object
      properties:
        id:
          type: integer
        freelancerId:
          type: integer
        employerId:
          type: integer
        title:
          type: string
        scheduledAt:
          type: string
          format: date-time
        durationMinutes:
          type: integer
        agenda:
          type: ["string", "null"]
        status:
          type: string
          description: "pending, confirmed, cancelled, completed"
        meetingLink:
          type: ["string", "null"]
        freelancerName:
          type: ["string", "null"]
        employerName:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - freelancerId
        - employerId
        - title
        - scheduledAt
        - durationMinutes
        - status
        - createdAt

    CreateMeetingBody:
      type: object
      properties:
        freelancerId:
          type: integer
        title:
          type: string
        scheduledAt:
          type: string
          format: date-time
        durationMinutes:
          type: integer
        agenda:
          type: string
        meetingLink:
          type: string
      required:
        - freelancerId
        - title
        - scheduledAt

    UpdateMeetingBody:
      type: object
      properties:
        status:
          type: string
        title:
          type: string
        scheduledAt:
          type: string
          format: date-time
        durationMinutes:
          type: integer
        agenda:
          type: string
        meetingLink:
          type: string

    # ── OpenAI Conversations ───────────────────────────────────────────────────
    OpenaiConversation:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        userId:
          type: integer
        jobRequirementId:
          type: ["integer", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - userId
        - createdAt
        - updatedAt

    OpenaiConversationWithMessages:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        userId:
          type: integer
        jobRequirementId:
          type: ["integer", "null"]
        messages:
          type: array
          items:
            $ref: "#/components/schemas/OpenaiMessage"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - userId
        - messages
        - createdAt
        - updatedAt

    OpenaiMessage:
      type: object
      properties:
        id:
          type: integer
        conversationId:
          type: integer
        role:
          type: string
          description: "user or assistant"
        content:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - conversationId
        - role
        - content
        - createdAt

    CreateOpenaiConversationBody:
      type: object
      properties:
        title:
          type: string
        jobRequirementId:
          type: ["integer", "null"]
      required:
        - title

    SendOpenaiMessageBody:
      type: object
      properties:
        content:
          type: string
      required:
        - content

    # ── Dashboard ──────────────────────────────────────────────────────────────
    DashboardStats:
      type: object
      properties:
        activeBookings:
          type: integer
        completedBookings:
          type: integer
        pendingAgreements:
          type: integer
        signedAgreements:
          type: integer
        totalEarnings:
          type: ["number", "null"]
        totalSpent:
          type: ["number", "null"]
        availableFreelancers:
          type: integer
        openJobRequirements:
          type: integer
        role:
          type: string
      required:
        - activeBookings
        - completedBookings
        - pendingAgreements
        - signedAgreements
        - availableFreelancers
        - openJobRequirements
        - role

    ActivityItem:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          description: "booking_created, agreement_signed, booking_completed, job_posted"
        description:
          type: string
        timestamp:
          type: string
          format: date-time
        metadata:
          type: object
          additionalProperties: true
      required:
        - id
        - type
        - description
        - timestamp

    # ── Verify Documents ──────────────────────────────────────────────────────
    VerifyDocumentsBody:
      type: object
      properties:
        documentUrls:
          type: array
          items:
            type: string
        documentNames:
          type: array
          items:
            type: string
      required:
        - documentUrls
        - documentNames

    VerifyDocumentsResult:
      type: object
      properties:
        status:
          type: string
          description: "verified | rejected | pending"
        note:
          type: string
          description: AI reviewer note
        emailSent:
          type: boolean
        emailPreviewUrl:
          type: ["string", "null"]
          description: Ethereal preview URL (dev only)
      required:
        - status
        - note
        - emailSent

    # ── Storage ────────────────────────────────────────────────────────────────
    UploadUrlRequest:
      type: object
      properties:
        fileName:
          type: string
        contentType:
          type: string
      required:
        - fileName
        - contentType

    ExpressInterestBody:
      type: object
      properties:
        message:
          type: ["string", "null"]

    JobInterest:
      type: object
      properties:
        id:
          type: integer
        jobRequirementId:
          type: integer
        freelancerId:
          type: integer
        message:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - jobRequirementId
        - freelancerId
        - createdAt

    JobInterestWithFreelancer:
      type: object
      properties:
        id:
          type: integer
        jobRequirementId:
          type: integer
        freelancerId:
          type: integer
        message:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        freelancerName:
          type: ["string", "null"]
        freelancerTagline:
          type: ["string", "null"]
      required:
        - id
        - jobRequirementId
        - freelancerId
        - createdAt

    MyJobInterest:
      type: object
      properties:
        expressed:
          type: boolean
        expressedAt:
          type: ["string", "null"]
          format: date-time
      required:
        - expressed

    Notification:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        type:
          type: string
        title:
          type: string
        message:
          type: string
        link:
          type: ["string", "null"]
        read:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - userId
        - type
        - title
        - message
        - read
        - createdAt

    PlanLimitError:
      type: object
      properties:
        error: { type: string }
        code: { type: string, enum: [PLAN_LIMIT] }
        planNeeded: { type: string }
      required: [error, code]

    PlanDef:
      type: object
      properties:
        id: { type: string }
        audience: { type: string }
        name: { type: string }
        priceMonthly: { type: number }
        tagline: { type: string }
        features:
          type: array
          items: { type: string }
        limits:
          type: object
          properties:
            monthlyJobPosts: { type: ["integer", "null"] }
            activeBookings: { type: ["integer", "null"] }
            monthlyExpressInterests: { type: ["integer", "null"] }
            teamSeats: { type: ["integer", "null"] }
        priority: { type: integer }
      required: [id, audience, name, priceMonthly, tagline, features, limits, priority]

    SubscriptionUsage:
      type: object
      properties:
        activeBookings: { type: integer }
        monthlyJobPosts: { type: integer }
        monthlyExpressInterests: { type: integer }
      required: [activeBookings, monthlyJobPosts, monthlyExpressInterests]

    SubscriptionSummary:
      type: object
      properties:
        plan: { $ref: "#/components/schemas/PlanDef" }
        status: { type: string }
        currentPeriodEnd: { type: ["string", "null"], format: date-time }
        usage: { $ref: "#/components/schemas/SubscriptionUsage" }
      required: [plan, status, usage]

    UpgradeSubscriptionBody:
      type: object
      properties:
        planId: { type: string }
      required: [planId]

    UploadUrlResponse:
      type: object
      properties:
        uploadUrl:
          type: string
        objectPath:
          type: string
      required:
        - uploadUrl
        - objectPath

    # ── Reviews ────────────────────────────────────────────────────────────────
    Review:
      type: object
      properties:
        id:
          type: integer
        bookingId:
          type: integer
        reviewerId:
          type: integer
        revieweeId:
          type: integer
        reviewerRole:
          type: string
          description: "employer or freelancer"
        rating:
          type: integer
          minimum: 1
          maximum: 5
        title:
          type: ["string", "null"]
        content:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - bookingId
        - reviewerId
        - revieweeId
        - reviewerRole
        - rating
        - createdAt

    CreateReviewBody:
      type: object
      properties:
        bookingId:
          type: integer
        rating:
          type: integer
          minimum: 1
          maximum: 5
        title:
          type: string
        content:
          type: string
      required:
        - bookingId
        - rating

    FreelancerReviewsResult:
      type: object
      properties:
        reviews:
          type: array
          items:
            $ref: "#/components/schemas/Review"
        averageRating:
          type: ["number", "null"]
        totalReviews:
          type: integer
      required:
        - reviews
        - totalReviews

    MyReviewResult:
      type: object
      properties:
        reviewed:
          type: boolean
        review:
          oneOf:
            - $ref: "#/components/schemas/Review"
            - type: "null"
      required:
        - reviewed

    SaveToggleResult:
      type: object
      properties:
        saved:
          type: boolean
      required:
        - saved

    # ── Portfolio ──────────────────────────────────────────────────────────────
    PortfolioItem:
      type: object
      properties:
        id:
          type: integer
        freelancerId:
          type: integer
        title:
          type: string
        description:
          type: ["string", "null"]
        url:
          type: ["string", "null"]
        imageUrl:
          type: ["string", "null"]
        tags:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - freelancerId
        - title
        - tags
        - createdAt
        - updatedAt

    CreatePortfolioItemBody:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        url:
          type: string
        imageUrl:
          type: string
        tags:
          type: array
          items:
            type: string
      required:
        - title

    UpdatePortfolioItemBody:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        url:
          type: string
        imageUrl:
          type: string
        tags:
          type: array
          items:
            type: string

    # ── Milestones ─────────────────────────────────────────────────────────────
    Milestone:
      type: object
      properties:
        id:
          type: integer
        bookingId:
          type: integer
        title:
          type: string
        description:
          type: ["string", "null"]
        amount:
          type: ["number", "null"]
        dueDate:
          type: ["string", "null"]
          format: date-time
        status:
          type: string
          description: "pending | completed | approved"
        completedAt:
          type: ["string", "null"]
          format: date-time
        approvedAt:
          type: ["string", "null"]
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - bookingId
        - title
        - status
        - createdAt
        - updatedAt

    CreateMilestoneBody:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        amount:
          type: number
        dueDate:
          type: string
          format: date-time
      required:
        - title

    UpdateMilestoneBody:
      type: object
      properties:
        status:
          type: string
          enum: [pending, completed, approved]
        title:
          type: string
        description:
          type: string
        amount:
          type: number
        dueDate:
          type: string
          format: date-time

    # ── Analytics ──────────────────────────────────────────────────────────────
    MonthlyMetric:
      type: object
      properties:
        month:
          type: string
        bookings:
          type: integer
        earnings:
          type: number
        spend:
          type: number
      required:
        - month
        - bookings

    AnalyticsData:
      type: object
      properties:
        role:
          type: string
        monthly:
          type: array
          items:
            $ref: "#/components/schemas/MonthlyMetric"
        totals:
          type: object
          additionalProperties: true
      required:
        - role
        - monthly
        - totals

    # ── Public Profile ─────────────────────────────────────────────────────────
    ResumeWorkExperience:
      type: object
      properties:
        company:
          type: string
        role:
          type: string
        startDate:
          type: string
        endDate:
          type: string
        highlights:
          type: array
          items:
            type: string
      required: [company, role, startDate, endDate, highlights]

    ResumeEducation:
      type: object
      properties:
        institution:
          type: string
        degree:
          type: string
        year:
          type: string
      required: [institution, degree, year]

    ResumeAnalysis:
      type: object
      properties:
        workExperience:
          type: array
          items:
            $ref: "#/components/schemas/ResumeWorkExperience"
        education:
          type: array
          items:
            $ref: "#/components/schemas/ResumeEducation"
        certifications:
          type: array
          items:
            type: string
        languages:
          type: array
          items:
            type: string
      required: [workExperience, education, certifications, languages]

    PublicFreelancerProfile:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        name:
          type: string
        tagline:
          type: string
        fieldOfWork:
          type: string
        skills:
          type: array
          items:
            type: string
        yearsExperience:
          type: integer
        bio:
          type: ["string", "null"]
        hourlyRate:
          type: ["number", "null"]
        dailyRate:
          type: ["number", "null"]
        paymentPreference:
          type: string
        isVerified:
          type: boolean
        isAvailable:
          type: boolean
        availableFrom:
          type: ["string", "null"]
          format: date-time
        availabilityNote:
          type: ["string", "null"]
        resumeAnalysis:
          $ref: "#/components/schemas/ResumeAnalysis"
          nullable: true
        portfolio:
          type: array
          items:
            $ref: "#/components/schemas/PortfolioItem"
        reviews:
          type: array
          items:
            $ref: "#/components/schemas/Review"
        averageRating:
          type: ["number", "null"]
        totalReviews:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - userId
        - name
        - tagline
        - fieldOfWork
        - skills
        - yearsExperience
        - paymentPreference
        - isVerified
        - isAvailable
        - portfolio
        - reviews
        - totalReviews
        - createdAt
